<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>矩形树图</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html, body {
  width: 100%;
  height: 100%;
}
body {
  font-family: "Heiti SC", "Microsoft YaHei", sans-serif;
  background: #fafafa;
  padding: 20px;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
}
.chart-wrap {
  background: white;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  padding: 24px;
  margin-bottom: 32px;
  min-height: 600px;
  display: flex;
  flex-direction: column;
}
.chart-wrap h1 {
  color: #222;
  font-size: 22px;
  margin-bottom: 6px;
}
.chart-wrap .subtitle {
  color: #888;
  font-size: 13px;
  margin-bottom: 24px;
}
.chart-container {
  flex: 1;
  width: 100%;
  min-height: 500px;
}
.plotly-graph-div {
  width: 100% !important;
  height: 100% !important;
}
.desc {
  background: white;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  padding: 24px;
  color: #555;
  font-size: 14px;
  line-height: 1.7;
}
.desc strong {
  color: #222;
}
</style>
</head>
<body>
<div class="container">
<div class="chart-wrap">
<h1>矩形树图</h1>
<div class="subtitle">treemap | plotly</div>
<div class="chart-container">
<div>
    <script>window.PlotlyConfig = {MathJaxConfig: 'local'};</script>
    <script charset="utf-8" src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <div id="treemap-7c7857ec84df4da6949028b917c7c926" class="plotly-graph-div" style="height:500px; width:100%;"></div>
    <script>
        (function() {
            try {
                var fig = {"data": [{"type": "treemap", "labels": ["iPhone 15 Pro", "iPhone 15", "iPad Pro", "iPad Air", "iPad", "iPhone"], "values": [5000.0, 3000.0, 2000.0, 1500.0, 3500.0, 8000.0], "parents": ["iPhone", "iPhone", "iPad", "iPad", "", ""], "branchvalues": "total", "marker": {"line": {"width": 0}, "colors": ["#003B71", "#005CAB", "#0083CA", "#00A3E0", "#7FBA00", "#FFC000"]}, "hovertemplate": "产品名=%{label}<br>销售额=%{value}<br>品类=%{parent}<extra></extra>"}], "layout": {"title": {"text": "矩形树图", "font": {"size": 16}}, "font": {"family": "Heiti SC, Microsoft YaHei, sans-serif"}, "plot_bgcolor": "white", "paper_bgcolor": "white", "margin": {"l": 0, "r": 0, "t": 40, "b": 0}, "hovermode": "closest", "height": 500}};
                Plotly.newPlot('treemap-7c7857ec84df4da6949028b917c7c926', fig.data, fig.layout, {
                    responsive: true,
                    displayModeBar: false
                });
            } catch (e) {
                console.error("Treemap render error:", e);
                var el = document.getElementById('treemap-7c7857ec84df4da6949028b917c7c926');
                if (el) {
                    el.innerHTML = '<div style="color:#c00;padding:12px;">图表渲染失败，请打开控制台查看错误。</div>';
                }
            }
        })();
    </script>
</div>
</div>
</div>
<div class="desc">
<strong>数据格式：</strong>labels列(类别名称) + values列(数值) + 可选parents列(父级)<br>
<strong>说明：</strong>用矩形面积表示占比，支持多层级嵌套展示。适合展示有层级且数量较多的分类数据。
</div>
</div>
</body>
</html>
